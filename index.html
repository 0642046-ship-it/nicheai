<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NicheAI</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #18181f;
    --surface2: #22222c;
    --accent: #7c6cfc;
    --accent2: #c084fc;
    --text: #f0f0f8;
    --muted: #7a7a8e;
    --success: #34d399;
    --border: #2a2a38;
    --radius: 16px;
    --nav-h: 68px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCREENS */
  .screen { display: none !important; flex-direction: column; min-height: calc(100vh - var(--nav-h)); padding: 20px 16px; padding-bottom: calc(var(--nav-h) + 20px); }
  .screen.active { display: flex !important; }

  /* NAV */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; background: none; border: none; cursor: pointer;
    color: var(--muted); font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: 600;
    transition: color 0.2s;
  }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 24px; height: 24px; }

  /* ONBOARDING */
  #screen-onboarding {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding-bottom: 0;
    background: radial-gradient(ellipse at 60% 20%, #2a1a6e44 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, #6c1fc844 0%, transparent 60%), var(--bg);
  }
  .onboarding-inner { text-align: center; max-width: 320px; }
  .logo { font-family: 'Unbounded', sans-serif; font-size: 32px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
  .onboarding-inner p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 32px; }
  .btn-primary {
    width: 100%; padding: 16px; border: none; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-family: 'Manrope', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.97); opacity: 0.9; }

  /* DIARY SCREEN */
  .screen-title { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 6px; }
  .screen-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  .niche-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, #2a1a6e, #3d1a6e);
    border: 1px solid var(--accent);
    border-radius: 12px; padding: 10px 16px;
    font-size: 13px; font-weight: 600; color: var(--accent2);
    margin-bottom: 24px;
  }

  .month-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

  .day-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
    transition: border-color 0.2s;
  }
  .day-card.today { border-color: var(--accent); }
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .day-num { font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 600; color: var(--accent); }
  .day-progress { font-size: 11px; color: var(--muted); }

  .task-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 8px 0;
    border-bottom: 1px solid var(--border); cursor: pointer;
  }
  .task-item:last-child { border-bottom: none; }
  .task-check {
    width: 20px; height: 20px; min-width: 20px;
    border: 2px solid var(--border); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; margin-top: 1px;
  }
  .task-item.done .task-check { background: var(--success); border-color: var(--success); }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
  .task-text { font-size: 13px; line-height: 1.5; }

  .empty-diary {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 12px; color: var(--muted); padding: 40px 20px;
  }
  .empty-diary svg { opacity: 0.3; }
  .empty-diary p { font-size: 14px; line-height: 1.6; }

  /* PROFILE / CHAT SCREEN */
  .profile-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 14px;
  }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 700; color: #fff;
  }
  .profile-name { font-weight: 700; font-size: 16px; }
  .profile-id { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .niche-result {
    background: linear-gradient(135deg, #1a1040, #2a1060);
    border: 1px solid var(--accent);
    border-radius: var(--radius); padding: 16px; margin-bottom: 20px;
  }
  .niche-result-label { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .niche-result-title { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .niche-result-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }

  .chat-section-label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

  .chat-messages {
    flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 12px; min-height: 200px; max-height: 340px;
  }
  .msg { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.5; }
  .msg.ai { background: var(--surface2); border-bottom-left-radius: 4px; align-self: flex-start; }
  .msg.user { background: linear-gradient(135deg, var(--accent), var(--accent2)); border-bottom-right-radius: 4px; align-self: flex-end; color: #fff; }
  .msg.typing { color: var(--muted); font-style: italic; }

  .chat-input-row { display: flex; gap: 8px; }
  .chat-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px; color: var(--text);
    font-family: 'Manrope', sans-serif; font-size: 14px; outline: none;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-send {
    width: 46px; height: 46px; border: none; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
  }
  .chat-send:active { transform: scale(0.93); }
  .chat-send:disabled { opacity: 0.4; }

  .loading-dots span {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); margin: 0 2px;
    animation: bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .reset-btn {
    width: 100%; padding: 12px; border-radius: var(--radius);
    background: transparent; border: 1px solid var(--border);
    color: var(--muted); font-family: 'Manrope', sans-serif; font-size: 13px;
    cursor: pointer; margin-top: 12px; transition: border-color 0.2s, color 0.2s;
  }
  .reset-btn:hover { border-color: #ff4444; color: #ff4444; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="screen-onboarding" class="screen active">
  <div class="onboarding-inner">
    <div class="logo">NicheAI</div>
    <p>Пройди опрос с ИИ, узнай свою нишу и получи персональный план на первые 100 000 ₽</p>
    <input id="apikey-input" type="password" placeholder="Вставь API ключ Claude (sk-ant-...)" style="width:100%;margin-bottom:12px;padding:14px;background:#22222c;border:1px solid #2a2a38;border-radius:12px;color:#f0f0f8;font-family:Manrope,sans-serif;font-size:13px;outline:none;" />
    <p id="apikey-error" style="color:#ff6b6b;font-size:12px;margin-bottom:12px;display:none;">Введи API ключ чтобы продолжить</p>
    <button class="btn-primary" id="start-btn">Начать →</button>
  </div>
</div>

<!-- DIARY -->
<div id="screen-diary" class="screen">
  <div class="screen-title">Ежедневник</div>
  <div class="screen-sub">Твой план на месяц</div>
  <div id="diary-content"></div>
</div>

<!-- PROFILE -->
<div id="screen-profile" class="screen">
  <div class="profile-header">
    <div class="avatar" id="avatar-letter">?</div>
    <div>
      <div class="profile-name" id="profile-name">Загрузка...</div>
      <div class="profile-id" id="profile-id">ID: —</div>
    </div>
  </div>

  <div id="niche-block" style="display:none">
    <div class="niche-result">
      <div class="niche-result-label">Твоя ниша</div>
      <div class="niche-result-title" id="niche-title"></div>
      <div class="niche-result-desc" id="niche-desc"></div>
    </div>
  </div>

  <div class="chat-section-label">ИИ-помощник</div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chat-input" type="text" placeholder="Написать сообщение..." />
    <button class="chat-send" id="chat-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <button class="reset-btn" onclick="resetApp()">🔄 Начать заново</button>
</div>

<!-- BOTTOM NAV -->
<nav class="nav" id="main-nav" style="display:none">
  <button class="nav-btn active" id="nav-diary" onclick="showScreen('diary')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
      <line x1="16" y1="2" x2="16" y2="6"></line>
      <line x1="8" y1="2" x2="8" y2="6"></line>
      <line x1="3" y1="10" x2="21" y2="10"></line>
    </svg>
    Ежедневник
  </button>
  <button class="nav-btn" id="nav-profile" onclick="showScreen('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
      <circle cx="12" cy="7" r="4"></circle>
    </svg>
    Профиль
  </button>
</nav>

<script>
let API_KEY = localStorage.getItem('nicheai_apikey') || '';
const MODEL = 'claude-sonnet-4-5';

let state = {
  chatHistory: [],
  niche: null,
  nicheDesc: null,
  plan: null,
  tasks: {}, // {dayIndex: [{ text, done }]}
  onboardingDone: false,
  userName: '',
  userId: ''
};

function saveState() {
  localStorage.setItem('nicheai_state', JSON.stringify(state));
}

function loadState() {
  const raw = localStorage.getItem('nicheai_state');
  if (raw) { document.getElementById("start-btn").addEventListener("click", startApp);
try { state = JSON.parse(raw); } catch(e) {} }
}

function startApp() {
  const keyInput = document.getElementById('apikey-input');
  if (keyInput) {
    const key = keyInput.value.trim();
    if (!key) {
      document.getElementById('apikey-error').style.display = 'block';
      return;
    }
    API_KEY = key;
    localStorage.setItem('nicheai_apikey', key);
  }
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('main-nav').style.display = 'flex';
  state.onboardingDone = true;
  saveState();
  loadProfile();
  showScreen('profile');
  if (state.chatHistory.length === 0) {
    startQuestionnaire();
  } else {
    renderChat();
    renderNiche();
    renderDiary();
  }
}

function loadProfile() {
  let name = 'Пользователь';
  let uid = '123456789';
  document.getElementById("start-btn").addEventListener("click", startApp);
try {
    const tg = window.Telegram?.WebApp;
    if (tg?.initDataUnsafe?.user) {
      const u = tg.initDataUnsafe.user;
      name = u.first_name + (u.last_name ? ' ' + u.last_name : '');
      uid = u.id;
    }
  } catch(e) {}
  state.userName = state.userName || name;
  state.userId = state.userId || uid;
  saveState();

  document.getElementById('profile-name').textContent = state.userName;
  document.getElementById('profile-id').textContent = 'ID: ' + state.userId;
  const letter = state.userName.charAt(0).toUpperCase();
  document.getElementById('avatar-letter').textContent = letter;
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + name).classList.add('active');
}

// ---- CHAT ----
const SYSTEM_PROMPT = `Ты ИИ-наставник по выбору ниши для заработка. Твоя задача — провести короткий опрос (5-7 вопросов), определить нишу для пользователя и составить план выхода на первые 100 000 рублей.

Веди себя живо, дружелюбно, без занудства. Задавай по одному вопросу за раз.

Вопросы касаются: навыков, опыта, интересов, сколько времени готов уделять, хочет ли работать с людьми или технически.

После опроса — определи нишу и ответь строго в формате JSON (только JSON, без пояснений вне JSON):
{
  "type": "result",
  "niche": "Название ниши",
  "nicheDesc": "Краткое описание 1-2 предложения",
  "plan": "Краткий план на 100к в 3-4 шагах",
  "tasks": [
    {"day": 1, "tasks": ["Задача 1", "Задача 2"]},
    {"day": 2, "tasks": ["Задача 1", "Задача 2"]},
    ...до 30 дней, по 2-3 задачи в день...
  ]
}

До финального результата — просто отвечай текстом, задавай вопросы по одному.`;

function addMsg(role, text, typing = false) {
  const box = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'assistant' ? 'ai' : 'user') + (typing ? ' typing' : '');
  if (typing) {
    div.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
    div.id = 'typing-indicator';
  } else {
    div.textContent = text;
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
  return div;
}

function renderChat() {
  const box = document.getElementById('chat-messages');
  box.innerHTML = '';
  state.chatHistory.forEach(m => {
    if (m.role !== 'system') addMsg(m.role, m.content);
  });
}

async function startQuestionnaire() {
  const greeting = 'Привет! 👋 Я помогу тебе найти нишу для заработка и составлю персональный план. Для начала — расскажи, что умеешь делать лучше всего? Это может быть что угодно: программирование, дизайн, продажи, готовка — всё подходит!';
  state.chatHistory.push({ role: 'assistant', content: greeting });
  saveState();
  addMsg('assistant', greeting);
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('chat-send');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  sendBtn.disabled = true;

  state.chatHistory.push({ role: 'user', content: text });
  saveState();
  addMsg('user', text);

  const typingEl = addMsg('assistant', '', true);

  document.getElementById("start-btn").addEventListener("click", startApp);
try {
    const messages = [{ role: 'user', content: SYSTEM_PROMPT }, ...state.chatHistory.filter(m => m.role !== 'system')];
    // Build proper alternating messages
    const apiMessages = buildApiMessages();

    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 2000,
        system: SYSTEM_PROMPT,
        messages: apiMessages
      })
    });

    const data = await res.json();
    typingEl.remove();

    const reply = data.content?.[0]?.text || 'Ошибка ответа';

    // Check if it's a JSON result
    document.getElementById("start-btn").addEventListener("click", startApp);
try {
      const cleaned = reply.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(cleaned);
      if (parsed.type === 'result') {
        handleResult(parsed);
        return;
      }
    } catch(e) {}

    state.chatHistory.push({ role: 'assistant', content: reply });
    saveState();
    addMsg('assistant', reply);

  } catch(e) {
    typingEl.remove();
    addMsg('assistant', 'Ошибка соединения. Попробуй ещё раз.');
  }

  sendBtn.disabled = false;
}

function buildApiMessages() {
  const msgs = state.chatHistory.filter(m => m.role !== 'system');
  // Ensure alternating user/assistant starting with user
  const result = [];
  for (let i = 0; i < msgs.length; i++) {
    if (result.length === 0 && msgs[i].role === 'assistant') continue;
    if (result.length > 0 && msgs[i].role === result[result.length-1].role) {
      result[result.length-1].content += '\n' + msgs[i].content;
    } else {
      result.push({ role: msgs[i].role, content: msgs[i].content });
    }
  }
  return result;
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMessage();
});

function handleResult(parsed) {
  state.niche = parsed.niche;
  state.nicheDesc = parsed.nicheDesc;
  state.plan = parsed.plan;

  // Build tasks object
  state.tasks = {};
  parsed.tasks.forEach(d => {
    state.tasks[d.day] = d.tasks.map(t => ({ text: t, done: false }));
  });

  state.chatHistory.push({ role: 'assistant', content: `✅ Ниша определена: ${parsed.niche}\n\n${parsed.nicheDesc}\n\nПлан: ${parsed.plan}\n\nЕжедневник заполнен на 30 дней — переходи во вкладку Ежедневник!` });
  saveState();

  addMsg('assistant', `✅ Ниша определена: ${parsed.niche}\n\n${parsed.nicheDesc}\n\nЕжедневник заполнен! Переходи во вкладку Ежедневник 📅`);

  renderNiche();
  renderDiary();
}

function renderNiche() {
  if (!state.niche) return;
  document.getElementById('niche-block').style.display = 'block';
  document.getElementById('niche-title').textContent = state.niche;
  document.getElementById('niche-desc').textContent = state.nicheDesc || '';
}

// ---- DIARY ----
function renderDiary() {
  const container = document.getElementById('diary-content');
  container.innerHTML = '';

  if (!state.niche) {
    container.innerHTML = `
      <div class="empty-diary">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="4" width="18" height="18" rx="2"></rect>
          <line x1="3" y1="10" x2="21" y2="10"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="16" y1="2" x2="16" y2="6"></line>
        </svg>
        <p>Сначала пройди опрос с ИИ-помощником во вкладке <strong>Профиль</strong> — и я заполню твой план!</p>
      </div>`;
    return;
  }

  // Niche badge
  const badge = document.createElement('div');
  badge.className = 'niche-badge';
  badge.innerHTML = `🎯 ${state.niche}`;
  container.appendChild(badge);

  const label = document.createElement('div');
  label.className = 'month-label';
  label.textContent = 'Май 2026 — 30 дней';
  container.appendChild(label);

  const today = new Date().getDate();

  for (let day = 1; day <= 30; day++) {
    const tasks = state.tasks[day] || [];
    const doneCnt = tasks.filter(t => t.done).length;
    const isToday = day === today;

    const card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today' : '');

    const header = document.createElement('div');
    header.className = 'day-header';
    header.innerHTML = `<span class="day-num">День ${day}${isToday ? ' 🔥' : ''}</span><span class="day-progress">${doneCnt}/${tasks.length}</span>`;
    card.appendChild(header);

    tasks.forEach((task, ti) => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' done' : '');
      item.innerHTML = `
        <div class="task-check">${task.done ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>' : ''}</div>
        <div class="task-text">${task.text}</div>`;
      item.onclick = () => toggleTask(day, ti, item, header, doneCnt);
      card.appendChild(item);
    });

    container.appendChild(card);
  }
}

function toggleTask(day, ti, itemEl, headerEl, prevDone) {
  state.tasks[day][ti].done = !state.tasks[day][ti].done;
  saveState();

  const done = state.tasks[day][ti].done;
  itemEl.className = 'task-item' + (done ? ' done' : '');
  itemEl.querySelector('.task-check').innerHTML = done
    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>'
    : '';

  const tasks = state.tasks[day];
  const doneCnt = tasks.filter(t => t.done).length;
  headerEl.querySelector('.day-progress').textContent = `${doneCnt}/${tasks.length}`;
}

function resetApp() {
  if (!confirm('Сбросить весь прогресс и начать заново?')) return;
  localStorage.removeItem('nicheai_state');
  location.reload();
}

// ---- INIT ----
loadState();
if (state.onboardingDone) {
  document.getElementById('screen-onboarding').classList.remove('active');
  document.getElementById('main-nav').style.display = 'flex';
  loadProfile();
  renderChat();
  renderNiche();
  renderDiary();
  showScreen('diary');
} else {
  document.getElementById('screen-onboarding').classList.add('active');
}

document.getElementById("start-btn").addEventListener("click", startApp);
try {
  window.Telegram?.WebApp?.ready();
  window.Telegram?.WebApp?.expand();
} catch(e) {}
</script>
</body>
</html>
